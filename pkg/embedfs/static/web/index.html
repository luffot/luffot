<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消息监听器 - 管理界面</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* 顶部 header */
        .header { background: #1a1a2e; color: white; padding: 0 1.5rem; height: 52px; display: flex; align-items: center; flex-shrink: 0; box-shadow: 0 2px 6px rgba(0,0,0,0.3); }
        .header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.02em; }
        .header .version { margin-left: auto; font-size: 0.7rem; color: rgba(255,255,255,0.4); }

        /* 主体：左侧菜单 + 右侧内容 */
        .layout { display: flex; flex: 1; overflow: hidden; }

        /* 左侧菜单栏 */
        .sidebar { width: 200px; background: #1e2235; display: flex; flex-direction: column; flex-shrink: 0; padding: 1rem 0; }
        .nav-item { display: flex; align-items: center; gap: 0.6rem; padding: 0.7rem 1.2rem; color: rgba(255,255,255,0.6); font-size: 0.875rem; cursor: pointer; transition: all 0.15s; text-decoration: none; border-left: 3px solid transparent; }
        .nav-item:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.9); }
        .nav-item.active { background: rgba(26,115,232,0.15); color: #6ab0f5; border-left-color: #1a73e8; }
        .nav-item .nav-icon { font-size: 1rem; width: 20px; text-align: center; }
        .nav-divider { height: 1px; background: rgba(255,255,255,0.07); margin: 0.5rem 1rem; }
        .nav-section-label { font-size: 0.65rem; color: rgba(255,255,255,0.3); padding: 0.5rem 1.2rem 0.2rem; text-transform: uppercase; letter-spacing: 0.08em; }

        /* 右侧内容区 */
        .main { flex: 1; overflow-y: auto; padding: 1.5rem; }

        /* 统计卡片 */
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: white; padding: 1.2rem 1.5rem; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .stat-card h3 { color: #888; font-size: 0.8rem; font-weight: 500; margin-bottom: 0.4rem; }
        .stat-card .value { font-size: 1.8rem; font-weight: 700; color: #1a1a2e; }

        /* 内容面板 */
        .content-grid { display: grid; grid-template-columns: 1fr 280px; gap: 1rem; }
        .panel { background: white; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); overflow: hidden; }
        .panel-header { padding: 0.9rem 1.2rem; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.75rem; }
        .panel-header h3 { font-size: 0.9rem; font-weight: 600; color: #1a1a2e; }
        .panel-body { padding: 0; }

        /* 消息列表 */
        .message-list { max-height: calc(100vh - 280px); overflow-y: auto; }
        .message-item { padding: 0.9rem 1.2rem; border-bottom: 1px solid #f5f5f5; }
        .message-item:last-child { border-bottom: none; }
        .message-meta { display: flex; gap: 0.75rem; font-size: 0.72rem; color: #999; margin-bottom: 0.35rem; flex-wrap: wrap; align-items: center; }
        .message-sender { font-weight: 600; color: #333; font-size: 0.8rem; }
        .message-session { background: #eef0f8; padding: 0.15rem 0.5rem; border-radius: 4px; }
        .message-content { color: #444; font-size: 0.875rem; white-space: pre-wrap; word-break: break-all; line-height: 1.5; }

        /* 应用列表 */
        .app-list { list-style: none; }
        .app-item { padding: 0.75rem 1.2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f5f5f5; }
        .app-item:last-child { border-bottom: none; }
        .app-name { font-size: 0.875rem; font-weight: 500; color: #333; }
        .app-status { font-size: 0.7rem; padding: 0.2rem 0.5rem; border-radius: 4px; }
        .app-status.enabled { background: #d4edda; color: #155724; }
        .app-status.disabled { background: #f8d7da; color: #721c24; }
        .refresh-info { font-size: 0.72rem; color: #bbb; padding: 0.6rem 1.2rem; }

        /* 搜索框 */
        .search-box { display: flex; gap: 0.4rem; }
        .search-box input { padding: 0.4rem 0.8rem; border: 1px solid #e0e0e0; border-radius: 6px; font-size: 0.8rem; width: 200px; outline: none; }
        .search-box input:focus { border-color: #1a73e8; }
        .search-box button { padding: 0.4rem 1rem; background: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
        .search-box button:hover { background: #1557b0; }

        .timestamp { color: #bbb; font-size: 0.7rem; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📬 消息监听器</h1>
        <span class="version">v1.0.0</span>
    </div>
    <div class="layout">
        <!-- 左侧菜单栏 -->
        <nav class="sidebar">
            <span class="nav-section-label">主菜单</span>
            <a class="nav-item active" href="/pkg/web/web/static">
                <span class="nav-icon">📊</span>
                <span>消息总览</span>
            </a>
            <div class="nav-divider"></div>
            <span class="nav-section-label">系统</span>
            <a class="nav-item" href="/settings">
                <span class="nav-icon">⚙️</span>
                <span>设置</span>
            </a>
        </nav>

        <!-- 右侧内容区 -->
        <div class="main">
            <div class="stats">
                <div class="stat-card">
                    <h3>总消息数</h3>
                    <div class="value" id="total-messages">-</div>
                </div>
                <div class="stat-card">
                    <h3>今日消息</h3>
                    <div class="value" id="today-messages">-</div>
                </div>
                <div class="stat-card">
                    <h3>监听应用</h3>
                    <div class="value" id="app-count">-</div>
                </div>
            </div>
            <div class="content-grid">
                <div class="panel">
                    <div class="panel-header">
                        <h3>消息列表</h3>
                        <div class="search-box">
                            <input type="text" id="search-input" placeholder="搜索消息...">
                            <button onclick="searchMessages()">搜索</button>
                        </div>
                    </div>
                    <div class="panel-body">
                        <div class="message-list" id="message-list">
                            <div style="text-align:center;color:#999;padding:2rem;">加载中...</div>
                        </div>
                    </div>
                </div>
                <div class="panel">
                    <div class="panel-header">
                        <h3>监听应用</h3>
                    </div>
                    <div class="panel-body">
                        <ul class="app-list" id="app-list">
                            <li style="text-align:center;color:#999;padding:1rem;">加载中...</li>
                        </ul>
                        <p class="refresh-info">每 5 秒自动刷新</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function loadStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                document.getElementById('total-messages').textContent = data.total_messages || 0;
                document.getElementById('today-messages').textContent = data.today_messages || 0;
                const appCount = Object.keys(data.app_counts || {}).length;
                document.getElementById('app-count').textContent = appCount;
            } catch (e) {
                console.log('加载统计失败:', e);
            }
        }

        async function loadMessages() {
            try {
                const res = await fetch('/api/messages?limit=50');
                const data = await res.json();
                const list = document.getElementById('message-list');
                if (!data.messages || data.messages.length === 0) {
                    list.innerHTML = '<div style="text-align:center;color:#999;padding:2rem;">暂无消息</div>';
                    return;
                }
                let html = '';
                for (let i = 0; i < data.messages.length; i++) {
                    const msg = data.messages[i];
                    html += '<div class="message-item">';
                    html += '<div class="message-meta">';
                    html += '<span class="message-sender">' + escapeHtml(msg.sender) + '</span>';
                    html += '<span class="message-session">' + escapeHtml(msg.session) + '</span>';
                    html += '<span class="timestamp">' + new Date(msg.timestamp).toLocaleString() + '</span>';
                    html += '</div>';
                    html += '<div class="message-content">' + escapeHtml(msg.content) + '</div>';
                    html += '</div>';
                }
                list.innerHTML = html;
            } catch (e) {
                console.log('加载消息失败:', e);
            }
        }

        async function loadApps() {
            try {
                const res = await fetch('/api/apps');
                const data = await res.json();
                const list = document.getElementById('app-list');
                if (!data.apps || data.apps.length === 0) {
                    list.innerHTML = '<li style="text-align:center;color:#999;padding:1rem;">暂无应用</li>';
                    return;
                }
                let html = '';
                for (let i = 0; i < data.apps.length; i++) {
                    const app = data.apps[i];
                    html += '<li class="app-item">';
                    html += '<span class="app-name">' + escapeHtml(app.display_name || app.name) + '</span>';
                    html += '<span class="app-status ' + (app.enabled ? 'enabled' : 'disabled') + '">' + (app.enabled ? '运行中' : '已禁用') + '</span>';
                    html += '</li>';
                }
                list.innerHTML = html;
            } catch (e) {
                console.log('加载应用列表失败:', e);
            }
        }

        async function searchMessages() {
            try {
                const q = document.getElementById('search-input').value;
                if (!q) { loadMessages(); return; }
                const res = await fetch('/api/search?q=' + encodeURIComponent(q));
                const data = await res.json();
                const list = document.getElementById('message-list');
                if (!data.messages || data.messages.length === 0) {
                    list.innerHTML = '<div style="text-align:center;color:#999;padding:2rem;">未找到相关消息</div>';
                    return;
                }
                let html = '';
                for (let i = 0; i < data.messages.length; i++) {
                    const msg = data.messages[i];
                    html += '<div class="message-item">';
                    html += '<div class="message-meta">';
                    html += '<span class="message-sender">' + escapeHtml(msg.sender) + '</span>';
                    html += '<span class="message-session">' + escapeHtml(msg.session) + '</span>';
                    html += '<span class="timestamp">' + new Date(msg.timestamp).toLocaleString() + '</span>';
                    html += '</div>';
                    html += '<div class="message-content">' + escapeHtml(msg.content) + '</div>';
                    html += '</div>';
                }
                list.innerHTML = html;
            } catch (e) {
                console.log('搜索失败:', e);
            }
        }

        // 初始加载
        loadStats();
        loadMessages();
        loadApps();

        // 定时刷新
        setInterval(function() { loadStats(); loadMessages(); }, 5000);
    </script>
</body>
</html>
